{% set name = "kcollections" %}
{% set version = "3.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/masakistan/kcollections/archive/refs/tags/v{{ version }}.tar.gz
  # Regenerate after tagging: ../../scripts/conda_sha256.sh {{ version }}
  sha256: 196151d503d1fdce4ea996a27af784f61a2e2e7490f3e0399557b57e5fff8978

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  missing_dso_whitelist:
    - "*/libpython*.so*"

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.18
    - make
    - pkg-config
  host:
    - python
    - pip
    - scikit-build-core >=0.10
    - pybind11 >=2.11
    - setuptools >=61
    - cmake >=3.18
  run:
    - python >=3.10

test:
  imports:
    - kcollections
  commands:
    - python -c "from kcollections import Kset, Kdict, Kcounter; Kset(11); Kdict(int, 11); Kcounter(11)"

about:
  home: https://github.com/masakistan/kcollections
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Memory-efficient Bloom Filter Trie for k-mer sets, dicts, and counters
  doc_url: https://github.com/masakistan/kcollections/blob/master/docs/USAGE.md

extra:
  recipe-maintainers:
    - masakistan
